<!-- @dsCard group="Components" viewport="700x620" name="Core — buttons, pills, labels" subtitle="Buttons, pills, num tags, labels, dividers, strike" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 28px 30px; display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .sect-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .block { }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
  const NS = window.Proposal_f8fc29;
  const { Button, Pill, NumTag, Eyebrow, Divider, StrikeText, MetaPair, Card } = NS;

  function Group({ label, children, style }) {
    return (
      <div className="block" style={style}>
        <div className="sect-label">{label}</div>
        {children}
      </div>
    );
  }

  function Demo() {
    return (
      <React.Fragment>
        <Group label="Button · variants & sizes">
          <div className="row">
            <Button variant="primary">Book the sprint</Button>
            <Button variant="secondary">Read approach</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="row" style={{ marginTop: 12 }}>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
          </div>
        </Group>

        <Divider variant="dashed" />

        <div className="grid2">
          <Group label="Pill">
            <div className="row">
              <Pill dot>05 Jun 2026 · V1.0</Pill>
              <Pill tone="accent">In progress</Pill>
            </div>
            <div className="row" style={{ marginTop: 10 }}>
              <Pill tone="solid">Confidential</Pill>
              <Pill tone="soft">Strategy</Pill>
            </div>
          </Group>
          <Group label="NumTag">
            <div className="row">
              <NumTag>DAY 1</NumTag>
              <NumTag variant="accent">01</NumTag>
              <NumTag variant="ghost">H3</NumTag>
            </div>
          </Group>
        </div>

        <Divider variant="dotted" tone="rule" />

        <div className="grid2">
          <Group label="Eyebrow + StrikeText">
            <Eyebrow>Engagement Plan / 2026</Eyebrow>
            <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 26, letterSpacing: "-0.025em", marginTop: 8, color: "var(--ink)" }}>
              The plan, <StrikeText variant="accent">in nine days.</StrikeText>
            </div>
            <div style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--ink-2)", marginTop: 6 }}>
              Decide <StrikeText>together</StrikeText> what to build.
            </div>
          </Group>
          <Group label="MetaPair">
            <div className="row" style={{ gap: 28 }}>
              <MetaPair label="For" value="KaarTech" sub="SAP → AI partner" />
              <MetaPair label="Your time" value="~12 hours" sub="over nine days" />
            </div>
          </Group>
        </div>

        <Divider variant="dashed" />

        <Group label="Card · tones">
          <div className="grid3">
            <Card tone="outline" label="Outline">Hairline on paper.</Card>
            <Card tone="fill" label="Fill">Recessed cream.</Card>
            <Card tone="ink" label="Ink">Inverted, dark.</Card>
          </div>
        </Group>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
