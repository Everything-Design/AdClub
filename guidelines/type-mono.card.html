<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-mono); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); }
  .chrome { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div><div class="spec">Eyebrow · 10.5 / 0.16em / accent</div><div class="eyebrow">Engagement Plan / 2026</div></div>
    <div><div class="spec">Label · 10 / 0.14em / ink</div><div class="label">From you · Founders, key decision makers</div></div>
    <div><div class="spec">Chrome · 10 / 0.08em / muted</div><div class="chrome">KaarTech × Everything Design&nbsp;&nbsp;·&nbsp;&nbsp;01 / 06</div></div>
  </div>
</body>
</html>
