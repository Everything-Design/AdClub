<!-- @dsCard group="Type" viewport="700x240" name="The triad in use" subtitle="Mono eyebrow → serif headline → sans body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); color: var(--ink); }
  .wrap { padding: 26px 30px; max-width: 600px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .head { font-family: var(--font-display); font-weight: 700; font-size: 40px; line-height: 0.98; letter-spacing: -0.03em; color: var(--ink); }
  .head .hi { color: var(--accent); }
  .body { font-family: var(--font-sans); font-size: 14.5px; line-height: 1.5; color: var(--ink-2); margin-top: 16px; max-width: 460px; }
  .rule { border: 0; border-top: 1px dashed var(--ink); margin: 18px 0 0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">The approach</div>
    <div class="head">Listen, study, argue,<br><span class="hi">then propose.</span></div>
    <p class="body">Three typefaces, one job each: Geist Mono labels the section, Petrona carries the argument, Open Sans does the reading. Emphasis is colour, never italics.</p>
    <hr class="rule">
  </div>
</body>
</html>
