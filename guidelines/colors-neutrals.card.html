<!-- @dsCard group="Colors" viewport="700x180" name="Paper & neutrals" subtitle="Paper, cream, muted warm grey" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 22px 24px; }
  .sw { border-radius: 2px; overflow: hidden; border: 1px solid var(--rule); }
  .chip { height: 84px; }
  .meta { padding: 9px 11px; }
  .name { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#ffffff · --paper</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="meta"><div class="name">Cream</div><div class="hex">#f3f1ec · --paper-2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="meta"><div class="name">Muted</div><div class="hex">#6a655c · --muted</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--canvas)"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#1d1b18 · behind sheets</div></div></div>
  </div>
</body>
</html>
