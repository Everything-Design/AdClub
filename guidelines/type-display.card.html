<!-- @dsCard group="Type" viewport="700x300" name="Display — Petrona" subtitle="The serif voice. Headings, weights 600–800, tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-display); color: var(--ink); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 6px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .d { font-family: var(--font-display); color: var(--ink); letter-spacing: -0.035em; line-height: 1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="d" style="font-weight:800;font-size:62px;letter-spacing:-0.045em">The plan,</span></div>
    <div class="line"><span class="d" style="font-weight:700;font-size:42px">in nine days.</span><span class="spec">700 · 42px</span></div>
    <div class="line"><span class="d" style="font-weight:700;font-size:30px">Listen, study, argue.</span><span class="spec">700 · 30px</span></div>
    <div class="line"><span class="d" style="font-weight:600;font-size:24px">A proposal you can act on.</span><span class="spec">600 · 24px</span></div>
    <div class="line"><span class="d" style="font-weight:600;font-size:17px">Decision-ready, by Day&nbsp;9.</span><span class="spec">600 · 17px</span></div>
  </div>
</body>
</html>
