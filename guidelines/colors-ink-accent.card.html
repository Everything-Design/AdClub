<!-- @dsCard group="Colors" viewport="700x180" name="Ink & accent" subtitle="Warm black, the one orange, the yellow strike" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 22px 24px; }
  .sw { border-radius: 2px; overflow: hidden; border: 1px solid var(--rule); }
  .chip { height: 84px; }
  .meta { padding: 9px 11px; }
  .name { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0e0d0c · --ink</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="meta"><div class="name">Ink 2</div><div class="hex">#2a2723 · --ink-2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="name">Accent</div><div class="hex">#fe532d · --accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-2)"></div><div class="meta"><div class="name">Strike</div><div class="hex">#f5a623 · --accent-2</div></div></div>
  </div>
</body>
</html>
